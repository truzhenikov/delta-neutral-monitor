version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    command: sh -c "pip install -e . && uvicorn src.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  bot:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    command: sh -c "pip install -e . && python -m src.bot.run"
    restart: unless-stopped
